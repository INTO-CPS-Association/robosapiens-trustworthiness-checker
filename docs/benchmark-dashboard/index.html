<!doctype html>
<html lang="en" data-page="important">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Key performance benchmarks</title>
    <link rel="stylesheet" href="dashboard.css">
  </head>
  <body>
    <header class="site-header">
      <div>
        <h1>Key performance benchmarks</h1>
      </div>
      <nav aria-label="Benchmark views">
        <a class="active" href="./">Key benchmarks</a>
        <a href="all.html">All benchmarks</a>
        <a href="data.js" download>Download data</a>
      </nav>
    </header>
    <div id="metadata" class="metadata" aria-live="polite"></div>
    <p class="dashboard-hint">Hover for exact values; click a point or bar to open its commit.</p>
    <main id="charts" class="charts"></main>
    <p id="empty-state" class="empty-state" hidden>No matching benchmark history was found.</p>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4/dist/Chart.min.js"></script>
    <script src="data.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
