<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 245" role="img" aria-labelledby="function-binding-arrow-title function-binding-arrow-desc" style="width:100%;max-width:900px;height:auto;background:#ffffff;border:1px solid #d0d7de;border-radius:6px">
<title id="function-binding-arrow-title">Function capture binding</title>
<desc id="function-binding-arrow-desc">Free variables are resolved to outer EnvironmentIds and stored with parameters and a shared executable body plan in DataflowFunctionDef.</desc>
<defs>
  <marker id="function-binding-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#65758b"/>
  </marker>
</defs>
<text x="24" y="27" text-anchor="start" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#17212b">Function definition after binding</text>
<rect x="35" y="62" width="170" height="62" rx="5" fill="#e8f1fb" stroke="#2563a6" stroke-width="1.5"/>
<text x="120" y="91" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" font-weight="600" fill="#17212b">outer environment</text>
<text x="120" y="109" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#52606d">bias, n, streams</text>
<rect x="275" y="55" width="205" height="76" rx="5" fill="#e6f5f0" stroke="#147d64" stroke-width="1.5"/>
<text x="377" y="91" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" font-weight="600" fill="#17212b">capture_sources</text>
<text x="377" y="109" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#52606d">resolved EnvironmentIds</text>
<line x1="205" y1="93" x2="275" y2="93" stroke="#65758b" stroke-width="1.8" marker-end="url(#function-binding-arrow)"/>
<rect x="550" y="48" width="300" height="90" rx="5" fill="#f3ebf8" stroke="#8055a3" stroke-width="1.5"/>
<text x="700" y="91" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" font-weight="600" fill="#17212b">DataflowFunctionDef</text>
<text x="700" y="109" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#52606d">params + capture slots + body plan</text>
<line x1="480" y1="93" x2="550" y2="93" stroke="#65758b" stroke-width="1.8" marker-end="url(#function-binding-arrow)"/>
<text x="445" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#52606d">store</text>
<rect x="550" y="158" width="300" height="62" rx="5" fill="#f7f9fb" stroke="#a8b3bf" stroke-width="1.5"/>
<text x="700" y="187" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" font-weight="600" fill="#17212b">shared ExecutablePlan</text>
<text x="700" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#52606d">body layout: [captures | params]</text>
<line x1="700" y1="138" x2="700" y2="158" stroke="#65758b" stroke-width="1.8" marker-end="url(#function-binding-arrow)"/>
</svg>
