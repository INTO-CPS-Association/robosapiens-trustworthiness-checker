name: Deploy Documentation

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-docs.yaml"
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install mdBook
        run: |
          cargo install mdbook --version ^0.4

      - name: Build documentation
        run: |
          cd docs
          mdbook build

      - name: Restore existing GitHub Pages site
        uses: actions/cache/restore@v4
        with:
          path: .pages-site
          key: pages-site-${{ github.run_id }}
          restore-keys: |
            pages-site-

      - name: Prepare GitHub Pages site
        run: |
          if [ -d .pages-site/benchmarks ]; then
            mv .pages-site/benchmarks /tmp/benchmark-pages
          fi

          rm -rf .pages-site
          mkdir -p .pages-site
          cp -a docs/book/. .pages-site/

          if [ -d /tmp/benchmark-pages ]; then
            mv /tmp/benchmark-pages .pages-site/benchmarks
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-site

      - name: Save GitHub Pages site
        uses: actions/cache/save@v4
        with:
          path: .pages-site
          key: pages-site-${{ github.run_id }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
