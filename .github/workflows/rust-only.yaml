name: Rust only workflow

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

concurrency:
  group: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'main-benchmarks' || github.run_id }}
  # Main benchmark writers must serialize with history backfills. A normal push
  # may wait for a migration, but must never cancel one already in progress.
  cancel-in-progress: false

jobs:
  workflow-default-settings:
    name: workflow default settings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install dependencies
        run: |
          sudo apt-get update &&
          sudo apt-get install -y libssl-dev cmake build-essential # Used by paho-mqtt

        # Do all the building first to fail early - sometimes we push without building specific settings:
      - name: Build project
        run: cargo build
      - name: Build project for testing
        run: cargo test --no-run
      - name: Select key dashboard benchmarks
        run: |
          cat > benchmark-targets.tsv <<'EOF'
          maple_sequence	^maple_sequence/(maple_sequence_untyped_dataflow|maple_sequence_untyped_semisync|maple_sequence_untyped_async)/25000$
          dyn_paper	^dyn_paper/(dyn_paper_50_dataflow|dyn_paper_50_semisync|dyn_paper_50)/100000$
          dup_defer	^dup_defer/(dup_defer_untyped_dataflow|dup_defer_untyped_semisync|dup_defer_untyped_async)/25000$
          dsrv_paper	^rec_moving_average/reconf_ct_(on|off)_percent_10/100$
          parsing	^parse_small_varied_inputs/parsing_lalrpop/10000$
          compilation_phases	^compilation_phases/(lalr_parse|strict_type_check|typed_dependency_graph|parse_typecheck_dependency_compile_typed)/1024$
          threshold_property	^threshold_property/(dsrv_dataflow|dsrv_semisync|mstlo_runtime_qual|mstlo_direct_qual)/10000$
          time_dependent_property	^time_dependent_property/(dsrv_default_window_dataflow|dsrv_default_window_semisync|mstlo_globally_window_qual|mstlo_direct_globally_window_qual)/10000$
          EOF
      - name: Build project for benching
        run: |
          cut -f1 benchmark-targets.tsv | while read -r benchmark; do
            cargo bench --profile bench-fast --package trustworthiness_checker --bench "$benchmark" --no-run
          done

        # Then run the tests and benches
      - name: Test project
        run: cargo test
      - name: Bench project
        run: |
          set -o pipefail
          : > benchmark-output.txt
          while IFS=$'\t' read -r benchmark filter; do
            cargo bench --profile bench-fast --package trustworthiness_checker --bench "$benchmark" -- "$filter" --output-format bencher 2>&1 |
              tee -a benchmark-output.txt
          done < benchmark-targets.tsv

      - name: Validate benchmark history
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git fetch origin benchmark-data
          git show FETCH_HEAD:benchmarks/data.js > /tmp/benchmark-data.js
          python scripts/validate_benchmark_data.py /tmp/benchmark-data.js

      - name: Update benchmark history
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # github-action-benchmark v1.22.1
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba
        with:
          name: RoboSAPIENS Criterion benchmarks
          tool: cargo
          output-file-path: benchmark-output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: benchmark-data
          benchmark-data-dir-path: benchmarks
          auto-push: true
          alert-threshold: "120%"
          comment-on-alert: true
          fail-on-alert: false

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: Benchmark report
          path: target/criterion/
          retention-days: 30
