name: Rust only workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  workflow-default-settings:
    name: workflow default settings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install dependencies
        run: |
          sudo apt-get update &&
          sudo apt-get install -y libssl-dev cmake build-essential # Used by paho-mqtt

        # Do all the building first to fail early - sometimes we push without building specific settings:
      - name: Build project
        run: cargo build
      - name: Build project for testing
        run: cargo test --no-run
      - name: List Criterion benchmark targets
        run: |
          cargo metadata --no-deps --format-version 1 |
            jq -r '.packages[] as $package | $package.targets[] | select(.kind | index("bench")) | [$package.name, .name] | @tsv' \
            > benchmark-targets.tsv
          test -s benchmark-targets.tsv
      - name: Build project for benching
        run: |
          while IFS=$'\t' read -r package benchmark; do
            cargo bench --profile bench-fast --package "$package" --bench "$benchmark" --no-run
          done < benchmark-targets.tsv

        # Then run the tests and benches
      - name: Test project
        run: cargo test
      - name: Bench project
        run: |
          set -o pipefail
          : > benchmark-output.txt
          while IFS=$'\t' read -r package benchmark; do
            cargo bench --profile bench-fast --package "$package" --bench "$benchmark" -- --output-format bencher 2>&1 |
              tee -a benchmark-output.txt
          done < benchmark-targets.tsv

      - name: Update benchmark history
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # github-action-benchmark v1.22.1
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba
        with:
          name: RoboSAPIENS Criterion benchmarks
          tool: cargo
          output-file-path: benchmark-output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: benchmark-data
          benchmark-data-dir-path: benchmarks
          auto-push: true
          alert-threshold: "120%"
          comment-on-alert: true
          fail-on-alert: false

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: Benchmark report
          path: target/criterion/
          retention-days: 30
