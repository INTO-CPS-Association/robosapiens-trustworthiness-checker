services:
  base:
    image: trustworthiness-checker:base
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: base
      args:
        - DSRV_LSP_URL=${DSRV_LSP_URL:-https://github.com/INTO-CPS-Association/robosapiens-trustworthiness-checker/releases/download/dsrv-lsp-2026-06-19/dsrv-lsp}
        - DSRV_LSP_SHA256=${DSRV_LSP_SHA256:-5465d45283c3ef585b6d24496a7692f5bcf05ec151ee2ebc12f53547bb83ad8d}
    # command: tmux
    stdin_open: true
    ipc: host
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority
      - /dev/shm:/dev/shm
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DISPLAY=${DISPLAY}
    network_mode: host
  emqx:
    image: emqx:latest
    restart: always
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: 127.0.0.1
    volumes:
      - vol-emqx-data:/opt/emqx/data
      - vol-emqx-etc:/opt/emqx/etc
      - vol-emqx-log:/opt/emqx/log
    network_mode: host
  dev:
    extends: base
    depends_on: [emqx]
    network_mode: host
    image: trustworthiness-checker:dev
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
      args:
        - UID=${UID:-1000}
        - GID=${UID:-1000}
        - USERNAME=${USERNAME:-devuser}
        - DSRV_LSP_URL=${DSRV_LSP_URL:-https://github.com/INTO-CPS-Association/robosapiens-trustworthiness-checker/releases/download/dsrv-lsp-2026-06-19/dsrv-lsp}
        - DSRV_LSP_SHA256=${DSRV_LSP_SHA256:-5465d45283c3ef585b6d24496a7692f5bcf05ec151ee2ebc12f53547bb83ad8d}
    user: ${USERNAME:-devuser}
    command: sleep infinity
    volumes:
      - ${XAUTHORITY:-$HOME/.Xauthority}:/home/${USERNAME:-devuser}/.Xauthority
      - /dev/shm:/dev/shm
  devtcnogpu:
    extends: dev
    environment:
      - LIBGL_ALWAYS_SOFTWARE=1
  devtcmesa:
    extends: dev
    volumes:
      - /dev/dri:/dev/dri
  devtcnvidia:
    extends: dev
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_DRIVER_CAPABILITIES=all
volumes:
  vol-emqx-data:
    name: tc-emqx-data
  vol-emqx-etc:
    name: tc-emqx-etc
  vol-emqx-log:
    name: tc-emqx-log
